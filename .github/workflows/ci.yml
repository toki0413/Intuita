name: Intuita CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  rust-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Rust format
        run: cd rust && cargo fmt --check
      - name: Clippy
        run: cd rust && cargo clippy -- -D warnings
      - name: Test
        run: cd rust && cargo test

  godot-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Godot
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_win64.exe.zip
          Expand-Archive godot.zip -DestinationPath .
      - name: Install gdUnit4
        run: |
          curl -L -o gdunit.zip https://github.com/godot-gdunit-labs/gdUnit4/archive/refs/tags/v6.1.3.zip
          Expand-Archive gdunit.zip -DestinationPath .
          New-Item -ItemType Directory -Path addons/gdUnit4 -Force
          Copy-Item -Path gdUnit4-6.1.3/addons/gdUnit4/* -Destination addons/gdUnit4 -Recurse -Force
          Remove-Item -Recurse -Force gdUnit4-6.1.3, gdunit.zip
      - name: Import project assets
        timeout-minutes: 10
        run: |
          ./Godot_v4.6.3-stable_win64_console.exe --headless --import --path .
      - name: Run gdUnit4 tests
        timeout-minutes: 15
        run: |
          cmd /c ".\Godot_v4.6.3-stable_win64_console.exe --headless --path . -s res://addons/gdUnit4/bin/GdUnitCmdTool.gd -a res://scripts/tests/ --ignoreHeadlessMode > test_output.txt 2>&1"
          $output = Get-Content test_output.txt -Raw
          $output -split "`n" | Select-String "Overall Summary|FAILED|Exit code" | ForEach-Object { Write-Host $_.Line }
          # Godot leaks resources at exit causing non-zero process exit code;
          # trust gdUnit4's own exit code string instead
          # gdUnit4 returns 0=pass, 1=fail, 100=error
          if ($output -notmatch "Exit code: 0") {
            Write-Host "`n=== FULL TEST OUTPUT ==="
            Write-Host $output
            exit 1
          }
          Write-Host "All gdUnit4 tests passed."
          exit 0
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gdunit-test-logs
          path: test_output.txt
